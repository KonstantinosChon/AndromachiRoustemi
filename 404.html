<!DOCTYPE html>
<html lang="el" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Σελίδα δεν βρέθηκε</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root[data-theme="light"] {
      --bg: #f7f5f2;
      --text: #1a1814;
      --text-soft: #6b6560;
      --accent: #7a6652;
      --line: rgba(26,24,20,0.12);
      --toggle-bg: #e0dbd4;
    }
    :root[data-theme="dark"] {
      --bg: #141210;
      --text: #f0ece6;
      --text-soft: #8a8480;
      --accent: #c4a882;
      --line: rgba(240,236,230,0.1);
      --toggle-bg: #2a2520;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* TOGGLE */
    .toggle-wrap {
      position: fixed;
      top: 1.4rem; right: 2rem;
      z-index: 100;
    }
    .toggle {
      width: 56px; height: 30px;
      background: var(--toggle-bg);
      border-radius: 99px;
      border: none; cursor: pointer;
      position: relative;
      transition: background 0.35s;
      padding: 0;
    }
    .toggle::before {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 24px; height: 24px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1;
    }
    [data-theme="dark"] .toggle::before { transform: translateX(26px); }
    .toggle-icons {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 6px; pointer-events: none;
    }
    .toggle-icon { width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; color: var(--text-soft); opacity: 0.5; }
    .toggle-icon svg { width: 13px; height: 13px; }
    [data-theme="light"] .toggle-icon.sun { opacity: 1; color: white; }
    [data-theme="dark"]  .toggle-icon.moon { opacity: 1; color: white; }

    /* CONTENT */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      animation: fadeUp 0.7s ease both;
    }

    .error-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(7rem, 20vw, 11rem);
      font-weight: 300;
      line-height: 1;
      color: var(--accent);
      opacity: 0.18;
      letter-spacing: -0.05em;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      white-space: nowrap;
      z-index: -1;
    }



    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      line-height: 1.2;
      margin-bottom: 0.8rem;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 0.88rem;
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .divider {
      width: 40px; height: 1px;
      background: var(--accent);
      margin: 1.5rem auto;
      opacity: 0.4;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .back-btn:hover {
      background: var(--accent);
      color: var(--bg);
      transform: translateY(-2px);
    }

    .diagnosis {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--text-soft);
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
    .diagnosis span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 480px) {
      .speech-bubble { right: -80px; font-size: 0.62rem; }
      .toggle-wrap { right: 1.2rem; top: 1rem; }
    }
  </style>
</head>
<body>

  <div class="toggle-wrap">
    <button class="toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <div class="toggle-icons">
        <span class="toggle-icon sun">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
        </span>
        <span class="toggle-icon moon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        </span>
      </div>
    </button>
  </div>

  <div class="container">

    <div class="error-num">404</div>

<h1>Η σελίδα <em>δεν βρέθηκε</em></h1>

    <div class="divider"></div>

    <p class="subtitle">
      Ακριβώς όπως οι εξετάσεις που χάνονται στο νοσοκομείο,<br>
      αυτή η σελίδα φαίνεται να έχει εξαφανιστεί.<br>
      Μάλλον πήγε για δεύτερη γνώμη.
    </p>

    <a href="https://andromachiroustemi.gr" class="back-btn">
      ← Επιστροφή στην καλύτερη ιατρό
    </a>



  </div>

  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    function toggleTheme() {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>

</body>
</html>
